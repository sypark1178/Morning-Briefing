name: 🌅 아침 브리핑 자동 발송

on:
  schedule:
    # 한국 시간(KST) 오전 6시 = UTC 21:00 (전날)
    - cron: "16 09 * * *"
  workflow_dispatch: 
  
jobs:
  send_briefing:        # Job ID (이름은 자유롭게 지정 가능)
    runs-on: ubuntu-latest  # 실행 환경 정의 (필수)
    steps:              # 작업 단계 시작
      - name: 📦 소스코드 가져오기
        uses: actions/checkout@v4

      - name: 📦 패키지 설치 및 확인
        run: |
          ls -R         # 현재 디렉토리 구조 전체 확인 (추천)
          echo "hello"
