name: 🌅 아침 브리핑 자동 발송

on:
  # ── 매일 KST 06:00 = UTC 21:00 (전날) ──────────────────
  schedule:
    - cron: "0 21 * * *"

  # ── 수동 실행 (테스트용) ────────────────────────────────
  workflow_dispatch:
    inputs:
      debug:
        description: "디버그 모드 (true/false)"
        required: false
        default: "false"

jobs:
  send-briefing:
    name: 브리핑 생성 & 발송
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 최대 30분 (GPT + 뉴스 수집 고려)

    steps:
      # ── 1. 코드 체크아웃 ───────────────────────────────
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 3.12 설정 ────────────────────────────
      - name: 🐍 Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. 의존성 설치 ─────────────────────────────────
      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements.txt


      # ── 4. 브리핑 생성 & Make Webhook 발송 ────────────
      - name: 🌅 브리핑 생성 및 Make Webhook 발송
        env:
          # ── OpenAI ─────────────────────────────────────
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}

          # ── 한국투자증권 KIS API ───────────────────────
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}

          # ── Make Webhook ───────────────────────────────
          MAKE_WEBHOOK_URL:   ${{ secrets.MAKE_WEBHOOK_URL }}

          # ── 디버그 플래그 ──────────────────────────────
          DEBUG_MODE:         ${{ github.event.inputs.debug || 'false' }}

        run: |
           python briefing.py

      # ── 5. 실행 로그 아티팩트 보존 (7일) ──────────────
      - name: 📋 로그 아티팩트 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-log-${{ github.run_id }}
          path: |
            briefing_output.html
            briefing_log.txt
          retention-days: 7
          if-no-files-found: ignore
